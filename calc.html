<!DOCTYPE html>
<html>
  <head>

    <link rel="stylesheet" href="calcStyler.css">
    <link rel="stylesheet" href="styl.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;700&display=swap" rel="stylesheet">
    <title>RandyCalculator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">

  </head>
  <body>
    <div class="top">
      
      <div class="info">
        <a class="item" href="#">About</a>
        <a class="item" href="#">Contact</a>
      </div>

      <div class="logo">
        <h2 href="index.html" style="text-decoration: none;">RANDY</h2>
      </div>

      <div class="links">
        <img class="icon" src = "imgs/linkedinlogo.png">
        <img class="icon" src = "imgs/gitlogo.png">
      </div>

    </div>

    <div class = "calcBody">
      <h1 style = "align-items:center;"> Simple Calculator </h1>

      <p id = "calculation">Input: </p>
  
      <p style="font-weight: bold; background-color: black; padding: 10px;" id = "output">- - -</p> </strong>
  
      <br>
      <div class = "inputButtons">

        <button onclick="inputNumber(7)" class = "button nums">7</button>
        <button onclick="inputNumber(8)" class = "button nums">8</button>
        <button onclick="inputNumber(9)" class = "button nums">9</button>
        <button onclick="inputNumber('*')" class = "button nums">X</button>
    
        <button onclick="inputNumber(4)" class = "button nums">4</button>
        <button onclick="inputNumber(5)" class = "button nums">5</button>
        <button onclick="inputNumber(6)" class = "button nums">6</button>
        <button onclick="inputNumber('-')" class = "button nums">--</button>
          
        <button onclick="inputNumber(1)" class = "button nums">1</button>
        <button onclick="inputNumber(2)" class = "button nums">2</button>
        <button onclick="inputNumber(3)" class = "button nums">3</button>
        <button onclick="inputNumber('+')" class = "button nums">+</button>
    
        <button onclick="inputNumber(0)" class = "button nums">0</button>
    
        <button onclick="inputNumber('c')" class = "button nums">C</button>
    
        <button onclick="calculate()" class="button button1">=</button>
        <button onclick="inputNumber('/')" class = "button nums">/</button>

      </div>
    </div>


    <!--Make it so you can type numbers while also clicking on buttons as an option-->
    <!--https://stackoverflow.com/questions/4416505/how-to-take-keyboard-input-in-javascript-->
  <script>

    var inputAsString = "";

    function calculate(){
      document.getElementById("output").innerHTML = eval(inputAsString);
    }

    function inputNumber(input){
      if (input=="c"){
        document.getElementById("calculation").innerHTML = "Input: ";

        document.getElementById("output").innerHTML = "CLEARED"

      inputAsString = "";

      }else if (input=="+"){
        document.getElementById("calculation").innerHTML = document.getElementById("calculation").innerHTML + input;

      inputAsString = inputAsString + input;
      }else if (input=="-"){
        document.getElementById("calculation").innerHTML = document.getElementById("calculation").innerHTML + input;

      inputAsString = inputAsString + input;
      }else if (input=="*"){
        document.getElementById("calculation").innerHTML = document.getElementById("calculation").innerHTML + input;

      inputAsString = inputAsString + input;
      }else if (input=="/"){
        document.getElementById("calculation").innerHTML = document.getElementById("calculation").innerHTML + input;

      inputAsString = inputAsString + input;
      }else{
        document.getElementById("calculation").innerHTML = document.getElementById("calculation").innerHTML + input;

      inputAsString = inputAsString + input;
      }
    }

  </script>

  </body>
</html>
